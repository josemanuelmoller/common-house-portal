<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clipper Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #eeeee8;
      --card:   #ffffff;
      --ink:    #0e0e0e;
      --muted:  #6b6b6b;
      --border: #d8d8d0;
      --lime:   #c8f55a;
      --danger: #c53030;
      --danger-tint: #fbe7e7;
    }
    html, body { margin: 0; padding: 0; }
    body {
      padding: 48px 24px 64px;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    .page-title {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -1.2px;
      margin: 0 0 6px 0;
      color: var(--ink);
      line-height: 1.05;
    }
    .page-title em {
      font-style: italic;
      font-weight: 900;
      color: var(--ink);
      background: var(--lime);
      padding: 0 8px;
      border-radius: 4px;
    }
    .sub {
      color: var(--muted);
      margin: 0 0 32px 0;
      font-size: 13px;
      letter-spacing: 0.1px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px 24px;
    }
    label {
      display: block;
      font-size: 9px;
      color: var(--muted);
      margin: 16px 0 6px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      font-weight: 700;
    }
    label:first-child { margin-top: 0; }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      background: var(--bg);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 13px;
      font-family: inherit;
      font-size: 13px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    input:focus {
      outline: none;
      border-color: var(--ink);
      background: var(--card);
    }
    .hint {
      color: var(--muted);
      font-size: 11px;
      margin-top: 5px;
      line-height: 1.4;
    }
    .hint code {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 10.5px;
      color: var(--ink);
    }
    .row { display: flex; gap: 10px; margin-top: 22px; }
    button {
      padding: 11px 20px;
      border: none;
      border-radius: 10px;
      font-size: 12.5px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.2px;
      transition: transform 0.05s ease, background 0.15s ease;
    }
    button:active { transform: translateY(1px); }
    button.primary {
      background: var(--lime);
      color: var(--ink);
    }
    button.primary:hover { background: #d4ff6a; }
    button.secondary {
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--bg); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }
    .status {
      margin-top: 16px;
      padding: 11px 14px;
      border-radius: 10px;
      display: none;
      font-size: 13px;
      line-height: 1.4;
    }
    .status.ok {
      background: var(--lime);
      color: var(--ink);
      display: block;
      font-weight: 600;
    }
    .status.err {
      background: var(--danger-tint);
      color: var(--danger);
      border: 1px solid #f0c0c0;
      display: block;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="page-title">Common <em>House</em> Clipper</h1>
    <p class="sub">Settings for the clipping extension.</p>

    <div class="card">
      <label for="token">Clipper token</label>
      <input type="password" id="token" placeholder="Paste CLIPPER_TOKEN here" autocomplete="off" />
      <div class="hint">Ask your CH admin for the token. Stored only in chrome.storage.local.</div>

      <label for="apiUrl">API URL</label>
      <input type="text" id="apiUrl" placeholder="https://portal.wearecommonhouse.com/api/clipper" />
      <div class="hint">Change to <code>http://localhost:3000/api/clipper</code> for local testing.</div>

      <div class="row">
        <button class="primary" id="save">Save</button>
        <button class="secondary" id="test">Test connection</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
