<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Clipper Settings</title>
  <style>
    :root {
      --bg: #0f0f10;
      --fg: #f5f5f3;
      --muted: #9a9a97;
      --card: #1a1a1c;
      --border: #2a2a2d;
      --accent: #c7f464;
      --accent-fg: #0f0f10;
      --ok: #86efac;
      --err: #f87171;
    }
    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
    }
    .wrap { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px 0; }
    .sub { color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.4px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      background: var(--card);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 13px;
    }
    .hint { color: var(--muted); font-size: 11px; margin-top: 4px; }
    .row { display: flex; gap: 10px; margin-top: 20px; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button.primary { background: var(--accent); color: var(--accent-fg); }
    button.secondary { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
    .status { margin-top: 14px; padding: 10px; border-radius: 8px; display: none; font-size: 13px; }
    .status.ok { background: rgba(134, 239, 172, 0.1); color: var(--ok); border: 1px solid rgba(134, 239, 172, 0.3); display: block; }
    .status.err { background: rgba(248, 113, 113, 0.1); color: var(--err); border: 1px solid rgba(248, 113, 113, 0.3); display: block; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Common House Clipper</h1>
    <div class="sub">Settings for the clipping extension.</div>

    <label for="token">Clipper token</label>
    <input type="password" id="token" placeholder="Paste CLIPPER_TOKEN here" autocomplete="off" />
    <div class="hint">Ask your CH admin for the token. Stored only in chrome.storage.local.</div>

    <label for="apiUrl">API URL</label>
    <input type="text" id="apiUrl" placeholder="https://portal.wearecommonhouse.com/api/clipper" />
    <div class="hint">Change to <code>http://localhost:3000/api/clipper</code> for local testing.</div>

    <div class="row">
      <button class="primary" id="save">Save</button>
      <button class="secondary" id="test">Test connection</button>
    </div>
    <div class="status" id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
